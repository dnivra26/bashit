name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross_linker: gcc-aarch64-linux-gnu
            linker_bin: aarch64-linux-gnu-gcc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross linker
        if: matrix.cross_linker
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cross_linker }}
          mkdir -p .cargo
          {
            echo '[target.${{ matrix.target }}]'
            echo 'linker = "${{ matrix.linker_bin }}"'
          } >> .cargo/config.toml

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          name="bashit-${{ matrix.target }}"
          mkdir -p "dist/$name"
          cp "target/${{ matrix.target }}/release/bashit" "dist/$name/"
          cp shell/bashit.zsh "dist/$name/"
          cp README.md LICENSE "dist/$name/" 2>/dev/null || true
          tar -C dist -czf "$name.tar.gz" "$name"

      - uses: actions/upload-artifact@v4
        with:
          name: bashit-${{ matrix.target }}
          path: bashit-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect artifacts and compute checksums
        run: |
          mkdir -p release
          find artifacts -name 'bashit-*.tar.gz' -exec cp {} release/ \;
          cd release
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.tar.gz
            release/checksums.txt
          generate_release_notes: true

  bump-formula:
    needs: release
    runs-on: ubuntu-latest
    # Skip if the tap PAT isn't set up yet — release still publishes fine.
    if: ${{ vars.HOMEBREW_TAP_REPO != '' }}
    steps:
      - name: Bump Homebrew tap formula
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: bashit
          formula-path: Formula/bashit.rb
          homebrew-tap: ${{ vars.HOMEBREW_TAP_REPO }}
          download-url: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/bashit-aarch64-apple-darwin.tar.gz
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
